name: Calendly Discord Booking Reminders

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: calendly-discord-booking-reminders
  cancel-in-progress: true

jobs:
  remind:
    name: Send due Calendly reminder rows
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CALENDLY_DISCORD_WEBHOOK_URL: ${{ secrets.CALENDLY_DISCORD_WEBHOOK_URL }}
      GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
      GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
      CALENDLY_REMINDERS_SPREADSHEET_ID: ${{ secrets.CALENDLY_REMINDERS_SPREADSHEET_ID }}
      CALENDLY_REMINDER_SUMMARY_FILE: .calendly-reminder-state/last-run-summary.json
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Send due Calendly reminder rows
        id: send_due_reminders
        run: node scripts/calendly-discord-reminders.mjs

      - name: Upload reminder summary
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: calendly-discord-reminder-summary
          path: .calendly-reminder-state/last-run-summary.json
          if-no-files-found: ignore
          retention-days: 30
